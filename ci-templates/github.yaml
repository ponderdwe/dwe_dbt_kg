# GitHub Actions — two-path deploy for branch {@ ENV_NAME @} → workspace {@ WORKSPACE_NAME @}
#
# Path 1 — pulumi/** changed        → pulumi up + full ASG instance refresh
# Path 2 — .env.example changed     → full ASG instance refresh (re-reads Secrets Manager)
# Path 3 — other app files changed  → SSM: git pull + docker-compose up on running instance
#
# Required repository secrets (CI only):
#   AWS_ACCESS_KEY_ID      — AWS credentials for Pulumi + SSM
#   AWS_SECRET_ACCESS_KEY  — AWS credentials for Pulumi + SSM
#   PULUMI_S3_STATE        — S3 backend URL, e.g. s3://my-pulumi-state-bucket
#
# All application secrets live in AWS Secrets Manager: {@ SECRET_NAME @}
# Pulumi reads that secret at deploy time; the EC2 instance pulls it on first boot.

name: Deploy — {@ ENV_NAME @}

on:
  push:
    branches: ["{@ ENV_NAME @}"]
  pull_request:
    branches: ["{@ ENV_NAME @}"]

env:
  AWS_REGION: {@ AWS_REGION @}
  WORKSPACE: {@ WORKSPACE_NAME @}
  SM_SECRET: {@ SECRET_NAME @}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      app: ${{ steps.filter.outputs.app }}
      env_file: ${{ steps.filter.outputs.env_file }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'pulumi/**'
            env_file:
              - '.env.example'
            app:
              - '**'
              - '!pulumi/**'

  # ── PR: preview infra changes ──────────────────────────────────────────────
  pulumi-preview:
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        working-directory: pulumi
      - uses: pulumi/actions@v5
        with:
          command: preview
          stack-name: ${{ env.WORKSPACE }}
          work-dir: pulumi
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_S3_STATE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: {@ AWS_REGION @}

  # ── Push: apply infra changes → full instance refresh ─────────────────────
  pulumi-apply:
    needs: detect-changes
    if: github.event_name == 'push' && needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: {@ AWS_REGION @}
      - run: pip install -r requirements.txt
        working-directory: pulumi
      - name: Install Pulumi CLI
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH
      - name: Pulumi login
        run: pulumi login $PULUMI_BACKEND_URL
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_S3_STATE }}
          PULUMI_CONFIG_PASSPHRASE: ""
      - name: Bump startup_code_version and deploy
        run: |
          cd pulumi
          pulumi stack select ${{ env.WORKSPACE }} 2>/dev/null || pulumi stack init ${{ env.WORKSPACE }}
          pulumi config set startup_code_version "${{ github.sha }}" --stack ${{ env.WORKSPACE }}
          pulumi up --yes --stack ${{ env.WORKSPACE }}
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_S3_STATE }}
          PULUMI_CONFIG_PASSPHRASE: ""
      - name: Full instance refresh
        run: |
          ASG_NAME=$(cd pulumi && pulumi stack output asg_name --stack ${{ env.WORKSPACE }})
          echo "Starting instance refresh for ASG: $ASG_NAME"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":300}' 2>&1 || true
          echo "Waiting for instance refresh to complete..."
          for i in $(seq 1 60); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "InstanceRefreshes[0].Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i/60] $STATUS"
            case "$STATUS" in
              Successful) echo "Instance refresh completed."; break ;;
              Failed|Cancelled) echo "Instance refresh $STATUS"; exit 1 ;;
            esac
            [ "$i" -eq 60 ] && { echo "Timeout waiting for instance refresh"; exit 1; }
            sleep 30
          done
        env:
          PULUMI_BACKEND_URL: ${{ secrets.PULUMI_S3_STATE }}
          PULUMI_CONFIG_PASSPHRASE: ""

  # ── Push: .env.example changed → full instance refresh ────────────────────
  deploy-app-full:
    needs: detect-changes
    if: >
      github.event_name == 'push' &&
      needs.detect-changes.outputs.env_file == 'true' &&
      needs.detect-changes.outputs.infra != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: {@ AWS_REGION @}
      - name: Full instance refresh (re-reads Secrets Manager on boot)
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --filters \
              "Name=tag:Environment,Values={@ WORKSPACE_NAME @}" \
              "Name=tag:ManagedBy,Values=Pulumi" \
            --query "AutoScalingGroups[0].AutoScalingGroupName" --output text)
          echo "Starting instance refresh for ASG: $ASG_NAME"
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage":0,"InstanceWarmup":300}' 2>&1 || true
          echo "Waiting for instance refresh to complete..."
          for i in $(seq 1 60); do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "InstanceRefreshes[0].Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i/60] $STATUS"
            case "$STATUS" in
              Successful) echo "Instance refresh completed."; break ;;
              Failed|Cancelled) echo "Instance refresh $STATUS"; exit 1 ;;
            esac
            [ "$i" -eq 60 ] && { echo "Timeout waiting for instance refresh"; exit 1; }
            sleep 30
          done

  # ── Push: other app changes → SSM restart on running instance ─────────────
  deploy-app:
    needs: detect-changes
    if: >
      github.event_name == 'push' &&
      needs.detect-changes.outputs.app == 'true' &&
      needs.detect-changes.outputs.infra != 'true' &&
      needs.detect-changes.outputs.env_file != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: {@ AWS_REGION @}
      - name: Install boto3
        run: pip install boto3 -q
      - name: Restart docker-compose on running EC2 via SSM
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --filters \
              "Name=tag:Environment,Values={@ WORKSPACE_NAME @}" \
              "Name=tag:ManagedBy,Values=Pulumi" \
            --query "AutoScalingGroups[0].AutoScalingGroupName" --output text)
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[0].InstanceId" --output text)
          echo "Restarting docker-compose on $INSTANCE_ID via SSM..."
          python3 - "$INSTANCE_ID" <<'PYEOF'
          import sys, time, boto3

          instance_id = sys.argv[1]
          ssm = boto3.client('ssm', region_name='{@ AWS_REGION @}')

          # Self-contained bootstrap: sets HOME, clones repo if missing, refreshes .env, restarts
          script = """\
          #!/bin/bash
          set -e
          export HOME=/root
          REGION={@ AWS_REGION @}
          SECRET_ID={@ SECRET_NAME @}
          BRANCH={@ ENV_NAME @}
          REPO_DIR=/home/ubuntu/dbt-kg
          REPO_URL={@ GIT_REPO_URL @}

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "$SECRET_ID" --region "$REGION" \
            --query SecretString --output text)
          GIT_USER=$(echo "$SECRET_JSON" | jq -r '.git_deploy_username // "x-token-auth"')
          GIT_TOKEN=$(echo "$SECRET_JSON" | jq -r '.git_deploy_token')

          if [ ! -d "$REPO_DIR" ]; then
            echo "Repo not found at $REPO_DIR — cloning..."
            REPO_PATH=$(echo "$REPO_URL" | sed 's,https://,,')
            git clone "https://$GIT_USER:$GIT_TOKEN@$REPO_PATH" "$REPO_DIR"
            git -C "$REPO_DIR" checkout "$BRANCH"
          else
            git config --global --add safe.directory "$REPO_DIR"
            git -C "$REPO_DIR" pull
          fi

          echo "$SECRET_JSON" | jq -r 'to_entries[] | .key + "=" + (.value | tostring)' > "$REPO_DIR/.env"
          echo "GRAPH_DB=falkordb" >> "$REPO_DIR/.env"
          echo "GRAPH_HOST=falkordb" >> "$REPO_DIR/.env"
          echo "GRAPH_PORT=6379" >> "$REPO_DIR/.env"

          /usr/local/bin/docker-compose -f "$REPO_DIR/docker-compose.yml" pull || true
          /usr/local/bin/docker-compose -f "$REPO_DIR/docker-compose.yml" up -d
          """

          resp = ssm.send_command(
              InstanceIds=[instance_id],
              DocumentName='AWS-RunShellScript',
              Parameters={'commands': [script]},
          )
          command_id = resp['Command']['CommandId']
          print(f'SSM command: {command_id} — waiting...')

          for i in range(1, 41):
              time.sleep(15)
              try:
                  inv = ssm.get_command_invocation(CommandId=command_id, InstanceId=instance_id)
                  status = inv['Status']
              except Exception:
                  status = 'Pending'
              print(f'  [{i}/40] {status}')
              if status == 'Success':
                  print('Restart completed.')
                  sys.exit(0)
              elif status in ('Failed', 'Cancelled', 'TimedOut'):
                  print(f'SSM command {status}')
                  print(inv.get('StandardOutputContent', ''))
                  print(inv.get('StandardErrorContent', ''))
                  sys.exit(1)

          print('Timeout waiting for SSM command')
          sys.exit(1)
          PYEOF
